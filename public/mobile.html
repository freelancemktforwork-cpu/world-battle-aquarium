<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="portrait">
    <meta name="theme-color" content="#000000">
    <title>World Battle Aquarium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            position: fixed; top: 0; left: 0;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0;
            overflow: hidden;
        }
        canvas {
            width: 100vw; height: 100vh;
            display: block;
            position: fixed; top: 0; left: 0;
        }

        /* ===== LEADERBOARD - TOP 5 ONLY ===== */
        #leaderboard {
            position: fixed;
            top: 8px;
            left: 8px;
            width: 150px;
            background: rgba(5,10,30,0.88);
            border: 1px solid rgba(100,180,255,0.2);
            border-radius: 10px;
            padding: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .lb-title {
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            padding: 5px 0;
            color: #FFD700;
            background: linear-gradient(180deg, rgba(255,215,0,0.12), transparent);
            border-bottom: 1px solid rgba(255,215,0,0.12);
            text-shadow: 0 0 6px rgba(255,215,0,0.4);
        }
        .lb-row {
            display: flex;
            align-items: center;
            padding: 3px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank { width: 18px; text-align: center; font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.4); flex-shrink: 0; }
        .lb-flag { width: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 2px; }
        .lb-flag img { width: 12px; height: 8px; border-radius: 1px; object-fit: cover; }
        .lb-name { flex: 1; font-size: 9px; font-weight: 600; color: #D0D8EE; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .lb-score { font-size: 9px; font-weight: 800; color: #7EB8FF; margin-left: 3px; flex-shrink: 0; }
        .lb-top1 { background: linear-gradient(90deg, rgba(255,215,0,0.12), transparent); border-left: 2px solid #FFD700; }
        .lb-top1 .lb-rank { color: #FFD700; }
        .lb-top1 .lb-name { color: #FFF; }
        .lb-top1 .lb-score { color: #FFD700; }
        .lb-top2 { background: linear-gradient(90deg, rgba(192,216,240,0.08), transparent); border-left: 2px solid #C0D8F0; }
        .lb-top2 .lb-rank { color: #C0D8F0; }
        .lb-top2 .lb-score { color: #C0D8F0; }
        .lb-top3 { background: linear-gradient(90deg, rgba(205,140,80,0.08), transparent); border-left: 2px solid #CD8C50; }
        .lb-top3 .lb-rank { color: #CD8C50; }
        .lb-top3 .lb-score { color: #CD8C50; }

        /* ===== VIEWER COUNT - TOP RIGHT ===== */
        #viewer-info {
            position: fixed;
            top: 8px;
            right: 8px;
            background: rgba(5,10,30,0.85);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 4px 10px;
            z-index: 100;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .viewer-icon { font-size: 10px; }
        #viewer-count { color: #fff; font-size: 11px; font-weight: 700; }

        /* ===== GIFT POPUP - TOP AREA ===== */
        #gift-popup-container {
            position: fixed;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
            width: 90%;
            max-width: 320px;
        }
        .gift-popup {
            width: 100%;
            opacity: 0;
            transform: translateY(-15px) scale(0.85);
            transition: all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
            pointer-events: none;
        }
        .gift-popup-show { opacity: 1; transform: translateY(0) scale(1); }
        .gift-popup-hide { opacity: 0; transform: translateY(-10px) scale(0.9); transition: all 0.3s ease-in; }
        .gift-popup-inner {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 12px;
            border: 1.5px solid #fff;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .gift-popup-tier { position: absolute; top: 2px; right: 6px; font-size: 6px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.6; text-transform: uppercase; }
        .gift-popup-gift-icon { font-size: 20px; flex-shrink: 0; }
        .gift-popup-info { flex: 1; min-width: 0; }
        .gift-popup-user { font-weight: bold; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .gift-popup-gift-name { font-size: 8px; opacity: 0.8; }
        .gift-popup-coins { font-size: 7px; opacity: 0.6; }
        .gift-popup-arrow { font-size: 14px; flex-shrink: 0; opacity: 0.5; }
        .gift-popup-fish { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .gift-popup-fish-icon { font-size: 18px; }
        .gift-popup-fish-name { font-size: 7px; font-weight: bold; opacity: 0.7; }

        .gift-popup-god .gift-popup-inner { animation: godShine 2s ease infinite; }
        .gift-popup-boss .gift-popup-inner { animation: bossFlame 1.5s ease infinite; }
        .gift-popup-mythic .gift-popup-inner { animation: mythicGlow 2s ease infinite; }
        @keyframes godShine { 0%,100% { box-shadow: 0 0 15px rgba(255,215,0,0.5), 0 0 30px rgba(224,86,253,0.3); border-color: #ffd700; } 50% { box-shadow: 0 0 25px rgba(224,86,253,0.5), 0 0 50px rgba(255,215,0,0.3); border-color: #e056fd; } }
        @keyframes bossFlame { 0%,100% { box-shadow: 0 0 12px rgba(214,48,49,0.5); } 50% { box-shadow: 0 0 25px rgba(225,112,85,0.7); } }
        @keyframes mythicGlow { 0%,100% { box-shadow: 0 0 12px rgba(108,92,231,0.4); } 50% { box-shadow: 0 0 25px rgba(224,86,253,0.6); } }
        @keyframes arrowPulse { 0%,100% { opacity: 0.3; transform: translateX(0); } 50% { opacity: 0.8; transform: translateX(2px); } }
        @keyframes giftBounce { 0% { transform: scale(0) rotate(-20deg); } 50% { transform: scale(1.3) rotate(10deg); } 100% { transform: scale(1) rotate(0deg); } }

        /* ===== EVOLUTION NOTIFY - BOTTOM AREA ===== */
        #evolution-notify {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%) scale(0.5);
            background: linear-gradient(135deg, rgba(255,200,50,0.92), rgba(255,150,0,0.88));
            color: #1a0a00;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 10px;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            text-align: center;
            box-shadow: 0 0 20px rgba(255,200,50,0.4);
            max-width: 85%;
            white-space: nowrap;
        }
        #evolution-notify.show { opacity: 1; transform: translateX(-50%) scale(1); }

        /* ===== PREDATOR WARNING ===== */
        #predator-warning {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 250;
            text-align: center;
            pointer-events: none;
            display: none;
        }
        #predator-warning.show { display: block; animation: warningPulse 1s ease infinite; }
        .warning-text { color: #ff4444; font-size: 13px; font-weight: 900; text-shadow: 0 0 12px rgba(255,0,0,0.6); }
        @keyframes warningPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }

        /* ===== CTA BOTTOM ===== */
        #bottom-cta {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25);
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 50;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }

        #music-controls { display: none !important; }
        #guide { display: none !important; }
        #like-progress { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="leaderboard"></div>
        <div id="viewer-info">
            <span class="viewer-icon">👁️</span>
            <span id="viewer-count">0</span>
        </div>
        <div id="gift-popup-container"></div>
        <div id="evolution-notify"></div>
        <div id="predator-warning">
            <div class="warning-text">⚠️ PREDATOR WAVE ⚠️<br>Send gifts to save your fish!</div>
        </div>
        <div id="guide"></div>
        <div id="like-progress"><div id="lp-rows"></div></div>
        <div id="bottom-cta">❤️ Like = Grow fish &nbsp;|&nbsp; 🎁 Gift = Spawn fish &nbsp;|&nbsp; 🐋 Big eat small!</div>
    </div>

    <!-- HIGH-RES CANVAS -->
    <script>
        (function() {
            var canvas = document.getElementById('gameCanvas');
            var dpr = Math.min(window.devicePixelRatio || 1, 3);
            function resize() {
                var w = window.innerWidth;
                var h = window.innerHeight;
                canvas.width = w * dpr;
                canvas.height = h * dpr;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                var ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
                canvas._logicalWidth = w;
                canvas._logicalHeight = h;
                canvas._dpr = dpr;
            }
            resize();
            window.addEventListener('resize', resize);
            document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
        })();
    </script>

    <script src="/js/bubble.js"></script>
    <script src="/js/fish.js"></script>
    <script src="/js/audio.js"></script>
    <script src="/js/mc.js"></script>
    <script src="/js/game.js"></script>

    <!-- MOBILE FISH SIZE OVERRIDE + LEADERBOARD CAP -->
    <script>
        (function() {
            var checkInterval = setInterval(function() {
                if (!window.game) return;
                clearInterval(checkInterval);

                // ===== 1. OVERRIDE: Giảm kích thước cá cho mobile =====
                // Giảm 50% so với PC
                var MOBILE_SIZE_SCALE = 0.5;
                var origGetRandom = window.game.getRandomFishForTier.bind(window.game);
                window.game.getRandomFishForTier = function(tier) {
                    var result = origGetRandom(tier);
                    result.size = result.size * MOBILE_SIZE_SCALE;
                    return result;
                };

                // Giảm kích thước cá đang tồn tại
                for (var i = 0; i < window.game.fishes.length; i++) {
                    var f = window.game.fishes[i];
                    if (f.size > 60) {
                        f.size = f.size * MOBILE_SIZE_SCALE;
                        f.baseSize = f.size;
                    }
                }

                // ===== 2. OVERRIDE: Leaderboard chỉ hiển thị TOP 5 =====
                window.game.updateLeaderboardUI = function() {
                    var board = document.getElementById('leaderboard');
                    if (!board) return;
                    var sorted = this.fishes
                        .filter(function(f) { return f.alive; })
                        .sort(function(a, b) { return (b.score||0) - (a.score||0); })
                        .slice(0, 5);  // CHỈ TOP 5

                    var html = '<div class="lb-title">🏆 TOP 5</div>';
                    for (var i = 0; i < sorted.length; i++) {
                        var fish = sorted[i];
                        var rank = i + 1;
                        var medal = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '#' + rank;
                        var cc = (fish.country || '').toUpperCase();
                        var flagHTML = '';
                        if (cc && cc.length === 2 && cc !== '🌍') {
                            flagHTML = '<img src="https://flagcdn.com/w40/' + cc.toLowerCase() + '.png" onerror="this.style.display=\'none\'">';
                        }
                        var rowClass = 'lb-row' + (rank === 1 ? ' lb-top1' : rank === 2 ? ' lb-top2' : rank === 3 ? ' lb-top3' : '');
                        html += '<div class="' + rowClass + '">'
                            + '<span class="lb-rank">' + medal + '</span>'
                            + '<span class="lb-flag">' + flagHTML + '</span>'
                            + '<span class="lb-name">' + (fish.username||'Fish') + '</span>'
                            + '<span class="lb-score">' + (fish.score||0) + '</span>'
                            + '</div>';
                    }
                    board.innerHTML = html;
                };

                // ===== 3. OVERRIDE: resizeCanvas cho hi-res =====
                window.game.resizeCanvas = function() {
                    var c = this.canvas;
                    var dpr = c._dpr || 1;
                    var w = c._logicalWidth || window.innerWidth;
                    var h = c._logicalHeight || window.innerHeight;
                    c.width = w * dpr;
                    c.height = h * dpr;
                    this.ctx.scale(dpr, dpr);
                };

                // ===== 4. OVERRIDE: Like farming cũng giảm size =====
                var origProcessLike = window.game.processLikeFarming.bind(window.game);
                window.game.processLikeFarming = function(username, country) {
                    origProcessLike(username, country);
                    // Tìm cá like-farm vừa spawn và giảm size
                    if (this.likeFarming[username] && this.likeFarming[username].lastFish) {
                        var lf = this.likeFarming[username].lastFish;
                        if (lf.alive && lf.size > 30) {
                            lf.size = lf.size * MOBILE_SIZE_SCALE;
                            lf.baseSize = lf.size;
                            lf.maxSize = lf.size * 2;
                        }
                    }
                };

                // ===== 5. OVERRIDE: Max fish giảm cho mobile =====
                window.game.MAX_FISH = 150;
                window.game.MAX_BUBBLES = 80;
                window.game.MAX_PARTICLES = 60;

                console.log('📱 Mobile optimizations applied!');

            }, 300);
        })();
    </script>
</body>
</html>
